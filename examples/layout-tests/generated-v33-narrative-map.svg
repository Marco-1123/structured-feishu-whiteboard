<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1320" viewBox="0 0 2200 1320">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0 0 L10 4 L0 8 z" fill="#2563EB"/>
  </marker>
</defs>
<rect x="0" y="0" width="2200" height="1320" fill="#F7FAFC"/>

<text x="92" y="104" font-size="50" fill="#172033" font-weight="700"><tspan x="92" dy="0">从问题到行动的论证地图</tspan></text>
<text x="94" y="146" font-size="23" fill="#5C6B82" font-weight="400"><tspan x="94" dy="0">把判断、原因、证据和行动放在同一条叙事线上。</tspan></text>
<rect x="92" y="206" width="2016" height="150" rx="18" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="1.5"/>
<rect x="92" y="206" width="12" height="150" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="130" y="248" font-size="18" fill="#2563EB" font-weight="700"><tspan x="130" dy="0">主判断</tspan></text>
<text x="130" y="298" font-size="30" fill="#172033" font-weight="700"><tspan x="130" dy="0">不是增加执行项，而是形成可追踪闭环。</tspan></text>
<rect x="92" y="416" width="2016" height="350" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="120" y="464" font-size="24" fill="#172033" font-weight="700"><tspan x="120" dy="0">论证路径</tspan></text>
<text x="120" y="498" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="120" dy="0">从现象到落地动作</tspan></text>
<rect x="120" y="520" width="464" height="214" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="568" font-size="23" fill="#172033" font-weight="700"><tspan x="142" dy="0">问题</tspan></text>
<text x="142" y="612" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="142" dy="0">目标分散，复盘结果无法横向比较。</tspan></text>
<line x1="588" y1="608" x2="610" y2="608" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="618" y="520" width="464" height="214" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="640" y="568" font-size="23" fill="#172033" font-weight="700"><tspan x="640" dy="0">归因</tspan></text>
<text x="640" y="612" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="640" dy="0">指标口径、责任边界和工具入口不统一。</tspan></text>
<line x1="1086" y1="608" x2="1108" y2="608" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1116" y="520" width="464" height="214" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1138" y="568" font-size="23" fill="#172033" font-weight="700"><tspan x="1138" dy="0">证据</tspan></text>
<text x="1138" y="612" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="1138" dy="0">同类问题重复出现，行动依赖个人经验。</tspan></text>
<line x1="1584" y1="608" x2="1606" y2="608" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1614" y="520" width="464" height="214" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1636" y="568" font-size="23" fill="#172033" font-weight="700"><tspan x="1636" dy="0">行动</tspan></text>
<text x="1636" y="612" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="1636" dy="0">建立统一口径、风险分层和复盘模板。</tspan></text>

<rect x="92" y="830" width="650" height="300" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="120" y="878" font-size="24" fill="#172033" font-weight="700"><tspan x="120" dy="0">关键证据</tspan></text>
<text x="120" y="912" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="120" dy="0">只保留能支撑判断的信息</tspan></text>
<rect x="120" y="930" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="120" y="930" width="6" height="51" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="138" y="959" font-size="17" fill="#172033" font-weight="700"><tspan x="138" dy="0">问题重复出现</tspan></text>
<text x="138" y="984" font-size="14" fill="#5C6B82" font-weight="400"><tspan x="138" dy="0">复盘缺少横向对比</tspan></text>
<rect x="120" y="993" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="120" y="993" width="6" height="51" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="138" y="1022" font-size="17" fill="#172033" font-weight="700"><tspan x="138" dy="0">路径无法复用</tspan></text>
<text x="138" y="1047" font-size="14" fill="#5C6B82" font-weight="400"><tspan x="138" dy="0">依赖人工经验</tspan></text>
<rect x="120" y="1056" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="120" y="1056" width="6" height="51" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="138" y="1085" font-size="17" fill="#172033" font-weight="700"><tspan x="138" dy="0">指标难以对齐</tspan></text>
<text x="138" y="1110" font-size="14" fill="#5C6B82" font-weight="400"><tspan x="138" dy="0">团队各自解释</tspan></text>
<rect x="776" y="830" width="650" height="300" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="804" y="878" font-size="24" fill="#172033" font-weight="700"><tspan x="804" dy="0">主要风险</tspan></text>
<text x="804" y="912" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="804" dy="0">不处理会继续放大协作成本</tspan></text>
<rect x="804" y="930" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="804" y="930" width="6" height="51" rx="3" fill="#8A5A44" stroke="#8A5A44" stroke-width="1"/>
<text x="822" y="959" font-size="17" fill="#8A5A44" font-weight="700"><tspan x="822" dy="0">行动变成清单</tspan></text>

<rect x="804" y="993" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="804" y="993" width="6" height="51" rx="3" fill="#8A5A44" stroke="#8A5A44" stroke-width="1"/>
<text x="822" y="1022" font-size="17" fill="#8A5A44" font-weight="700"><tspan x="822" dy="0">责任继续漂移</tspan></text>

<rect x="804" y="1056" width="594" height="51" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="804" y="1056" width="6" height="51" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="822" y="1085" font-size="17" fill="#2563EB" font-weight="700"><tspan x="822" dy="0">复盘不能沉淀</tspan></text>

<rect x="1460" y="830" width="648" height="300" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="1488" y="878" font-size="24" fill="#172033" font-weight="700"><tspan x="1488" dy="0">推荐动作</tspan></text>
<text x="1488" y="912" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="1488" dy="0">先统一，再自动化</tspan></text>
<rect x="1488" y="930" width="592" height="36" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="1488" y="930" width="6" height="36" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="1506" y="959" font-size="17" fill="#172033" font-weight="700"><tspan x="1506" dy="0">定义核心指标</tspan></text>

<rect x="1488" y="978" width="592" height="36" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="1488" y="978" width="6" height="36" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="1506" y="1007" font-size="17" fill="#172033" font-weight="700"><tspan x="1506" dy="0">明确风险边界</tspan></text>

<rect x="1488" y="1026" width="592" height="36" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="1488" y="1026" width="6" height="36" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="1506" y="1055" font-size="17" fill="#172033" font-weight="700"><tspan x="1506" dy="0">建立复盘模板</tspan></text>

<rect x="1488" y="1074" width="592" height="36" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.2"/>
<rect x="1488" y="1074" width="6" height="36" rx="3" fill="#2563EB" stroke="#2563EB" stroke-width="1"/>
<text x="1506" y="1103" font-size="17" fill="#172033" font-weight="700"><tspan x="1506" dy="0">把动作写入流程</tspan></text>

<text x="92" y="1216" font-size="22" fill="#5C6B82" font-weight="400"><tspan x="92" dy="0">适合诊断、观点表达、决策说明和咨询式汇报。</tspan></text>
</svg>
