<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1100" viewBox="0 0 1680 1100">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0 0 L10 4 L0 8 z" fill="#5E6AD2"/>
  </marker>
</defs>
<rect x="0" y="0" width="1680" height="1100" fill="#F7F8FA"/>

<rect x="72" y="60" width="1536" height="150" rx="18" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<rect x="72" y="60" width="16" height="150" rx="8" fill="#111827"/>
<text x="112" y="128" font-size="50" fill="#111827" font-weight="700"><tspan x="112" dy="0">团队 Agent 协作升级</tspan></text>
<text x="112" y="181" font-size="26" fill="#5F6B7A" font-weight="400"><tspan x="112" dy="0">把个人效率工具升级为可协作、可治理、可复用的团队能力。</tspan></text>
<rect x="72" y="250" width="1536" height="170" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<rect x="72" y="250" width="12" height="170" rx="6" fill="#111827"/>
<text x="112" y="290" font-size="19" fill="#5E6AD2" font-weight="700"><tspan x="112" dy="0">系统判断</tspan></text>
<text x="112" y="349" font-size="32" fill="#111827" font-weight="700"><tspan x="112" dy="0">先统一身份和上下文，再沉淀高频 Skill，最后补齐权限、</tspan><tspan x="112" dy="42">审计和复盘机制。</tspan></text>
<rect x="72" y="460" width="493" height="334" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<text x="108" y="536" font-size="28" fill="#111827" font-weight="700"><tspan x="108" dy="0">身份边界</tspan></text>
<text x="108" y="592" font-size="21" fill="#5F6B7A" font-weight="400"><tspan x="108" dy="0">区分个人、团队、项目和 Bot 身份</tspan><tspan x="108" dy="32">明确资料权限和共享范围</tspan></text>

<rect x="108" y="698" width="146" height="36" rx="8" fill="#ECEEFE" stroke="#D8DEE8" stroke-width="1"/>
<text x="126" y="723" font-size="17" fill="#5E6AD2" font-weight="700"><tspan x="126" dy="0">先定边界</tspan></text>
<rect x="593" y="460" width="493" height="334" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<text x="629" y="536" font-size="28" fill="#111827" font-weight="700"><tspan x="629" dy="0">能力沉淀</tspan></text>
<text x="629" y="592" font-size="21" fill="#5F6B7A" font-weight="400"><tspan x="629" dy="0">把高频动作脚本化和 Skill 化</tspan><tspan x="629" dy="32">用测试样例约束输出稳定性</tspan></text>

<rect x="629" y="698" width="146" height="36" rx="8" fill="#ECEEFE" stroke="#D8DEE8" stroke-width="1"/>
<text x="647" y="723" font-size="17" fill="#5E6AD2" font-weight="700"><tspan x="647" dy="0">形成复用</tspan></text>
<rect x="1114" y="460" width="493" height="334" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<text x="1150" y="536" font-size="28" fill="#111827" font-weight="700"><tspan x="1150" dy="0">治理闭环</tspan></text>
<text x="1150" y="592" font-size="21" fill="#5F6B7A" font-weight="400"><tspan x="1150" dy="0">高风险动作保留审批和日志</tspan><tspan x="1150" dy="32">用复盘持续修正协作规则</tspan></text>

<rect x="1150" y="698" width="146" height="36" rx="8" fill="#ECEEFE" stroke="#D8DEE8" stroke-width="1"/>
<text x="1168" y="723" font-size="17" fill="#16A085" font-weight="700"><tspan x="1168" dy="0">可追踪</tspan></text>
<rect x="72" y="870" width="1536" height="112" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
<rect x="72" y="870" width="12" height="112" rx="6" fill="#111827"/>
<text x="112" y="936" font-size="25" fill="#111827" font-weight="700"><tspan x="112" dy="0">判断标准：团队成员变化后，Agent 仍能知道我是谁、资料在哪、下一步走什么流程。</tspan></text>

</svg>
