<text x="150" y="598" font-size="20" fill="#6E6E73" font-weight="400"><tspan x="150" dy="0">Wiki 记录稳定原则和历史判断</tspan><tspan x="150" dy="30">避免关键经验散落在对话里</tspan></text>

<rect x="150" y="690" width="150" height="36" rx="18" fill="#F2F2F7" stroke="#D2D2D7" stroke-width="1"/>
