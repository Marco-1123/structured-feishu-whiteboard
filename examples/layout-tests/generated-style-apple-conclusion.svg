<rect x="0" y="0" width="1680" height="1000" fill="#F5F5F7"/>

<text x="120" y="118" font-size="56" fill="#1D1D1F" font-weight="700"><tspan x="120" dy="0">团队知识承载方式选择</tspan></text>
<text x="122" y="162" font-size="24" fill="#6E6E73" font-weight="400"><tspan x="122" dy="0">在沉淀能力、可读性和协作成本之间取舍。</tspan></text>
