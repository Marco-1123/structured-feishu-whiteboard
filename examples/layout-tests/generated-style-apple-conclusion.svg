<text x="641" y="598" font-size="20" fill="#6E6E73" font-weight="400"><tspan x="641" dy="0">Skill 承载稳定流程和验收标准</tspan><tspan x="641" dy="30">让其他 Agent 也能复现产出</tspan></text>

