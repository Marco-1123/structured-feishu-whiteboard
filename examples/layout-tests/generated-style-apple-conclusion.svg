<text x="152" y="348" font-size="30" fill="#1D1D1F" font-weight="700"><tspan x="152" dy="0">项目级 LLM Wiki 适合作为长期知识层，执行规则进入</tspan><tspan x="152" dy="38">Skill，展示材料进入飞书文档。</tspan></text>
