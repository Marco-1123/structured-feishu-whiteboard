<text x="1162" y="735" font-size="17" fill="#16A085" font-weight="700"><tspan x="1162" dy="0">control</tspan></text>

<rect x="72" y="852" width="1536" height="112" rx="16" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
