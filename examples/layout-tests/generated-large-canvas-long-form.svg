<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1820" viewBox="0 0 2400 1820">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0 0 L10 4 L0 8 z" fill="#2563EB"/>
  </marker>
</defs>
<rect x="0" y="0" width="2400" height="1820" fill="#F7FAFC"/>

<text x="92" y="122" font-size="52" fill="#172033" font-weight="700"><tspan x="92" dy="0">H2智能化经营推进框架</tspan></text>
<text x="92" y="164" font-size="24" fill="#5C6B82" font-weight="400"><tspan x="92" dy="0">以 onepage 大画布保留主线、证据、风险和行动。</tspan></text>
<rect x="92" y="208" width="2216" height="142" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="92" y="208" width="12" height="142" rx="6" fill="#2563EB"/>
<text x="130" y="252" font-size="21" fill="#2563EB" font-weight="700"><tspan x="130" dy="0">核心结论</tspan></text>
<text x="130" y="304" font-size="31" fill="#172033" font-weight="700"><tspan x="130" dy="0">H2 不应堆项目清单，而要用统一目标、专项治理、指标闭环和复用机制形成半年度推进框架。</tspan></text>

<text x="92" y="424" font-size="30" fill="#172033" font-weight="700"><tspan x="92" dy="0">四个核心举措</tspan></text>
<rect x="92" y="470" width="1090" height="242" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="126" y="493" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="518" font-size="18" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">01</tspan></text>
<text x="210" y="576" font-size="28" fill="#172033" font-weight="700"><tspan x="210" dy="0">统一目标</tspan></text>
<line x1="126" y1="564" x2="1148" y2="564" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="126" y="630" font-size="21" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">对齐覆盖降险提效三条主线</tspan><tspan x="126" dy="31">把项目从清单收束为框架</tspan><tspan x="126" dy="31">每个专项只保留一个主目标</tspan></text>
<rect x="1218" y="470" width="1090" height="242" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="1252" y="493" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1268" y="518" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1268" dy="0">02</tspan></text>
<text x="1336" y="576" font-size="28" fill="#172033" font-weight="700"><tspan x="1336" dy="0">专项治理</tspan></text>
<line x1="1252" y1="564" x2="2274" y2="564" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1252" y="630" font-size="21" fill="#5C6B82" font-weight="400"><tspan x="1252" dy="0">优先处理高频高风险场景</tspan><tspan x="1252" dy="31">明确负责人节奏和验收口径</tspan><tspan x="1252" dy="31">避免多个团队各自推进</tspan></text>
<rect x="92" y="746" width="1090" height="242" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="126" y="769" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="794" font-size="18" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">03</tspan></text>
<text x="210" y="852" font-size="28" fill="#172033" font-weight="700"><tspan x="210" dy="0">数据闭环</tspan></text>
<line x1="126" y1="840" x2="1148" y2="840" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="126" y="906" font-size="21" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">建立统一指标字典和复盘模板</tspan><tspan x="126" dy="31">上线后持续追踪异常和反馈</tspan><tspan x="126" dy="31">让结果能横向比较</tspan></text>
<rect x="1218" y="746" width="1090" height="242" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="1252" y="769" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1268" y="794" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1268" dy="0">04</tspan></text>
<text x="1336" y="852" font-size="28" fill="#172033" font-weight="700"><tspan x="1336" dy="0">能力复用</tspan></text>
<line x1="1252" y1="840" x2="2274" y2="840" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1252" y="906" font-size="21" fill="#5C6B82" font-weight="400"><tspan x="1252" dy="0">沉淀入口配置编排和评估能力</tspan><tspan x="1252" dy="31">把单点工具升级为平台能力</tspan><tspan x="1252" dy="31">让下一批专项更快复用</tspan></text>

<rect x="92" y="1058" width="725" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="126" y="1112" font-size="30" fill="#172033" font-weight="700"><tspan x="126" dy="0">阶段路线</tspan></text>
<text x="126" y="1150" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">先对齐，再闭环，最后沉淀为可复用能力。</tspan></text>
<rect x="126" y="1184" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="146" y="1222" font-size="21" fill="#172033" font-weight="700"><tspan x="146" dy="0">阶段一 对齐</tspan></text>
<text x="146" y="1254" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="146" dy="0">两周内完成场景盘点</tspan></text>
<line x1="345" y1="1233" x2="367" y2="1233" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="366" y="1184" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="386" y="1222" font-size="21" fill="#172033" font-weight="700"><tspan x="386" dy="0">阶段二 闭环</tspan></text>
<text x="386" y="1254" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="386" dy="0">选择 3 个高价值</tspan><tspan x="386" dy="22">专项</tspan></text>
<line x1="585" y1="1233" x2="607" y2="1233" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="606" y="1184" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="626" y="1222" font-size="21" fill="#172033" font-weight="700"><tspan x="626" dy="0">阶段三 复用</tspan></text>
<text x="626" y="1254" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="626" dy="0">沉淀配置编排和评估</tspan><tspan x="626" dy="22">能力</tspan></text>
<text x="126" y="1358" font-size="18" fill="#2563EB" font-weight="700"><tspan x="126" dy="0">近期动作</tspan></text>
<rect x="126" y="1376" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="1401" font-size="17" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">完成场景清单</tspan></text>
<rect x="463" y="1376" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="479" y="1401" font-size="17" fill="#2563EB" font-weight="700"><tspan x="479" dy="0">明确验收口径</tspan></text>
<rect x="126" y="1424" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="1449" font-size="17" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">建立复盘节奏</tspan></text>
<rect x="854" y="1058" width="676" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="888" y="1112" font-size="30" fill="#172033" font-weight="700"><tspan x="888" dy="0">指标与证据</tspan></text>
<text x="888" y="1150" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">半成品指标可以保留，但必须服务主线并有业务语义。</tspan></text>
<rect x="888" y="1182" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="904" y="1211" font-size="19" fill="#2563EB" font-weight="700"><tspan x="904" dy="0">覆盖率目标 xx%</tspan></text>
<rect x="1201" y="1182" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1217" y="1211" font-size="19" fill="#2563EB" font-weight="700"><tspan x="1217" dy="0">提效目标 xx%</tspan></text>
<rect x="888" y="1240" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="904" y="1269" font-size="19" fill="#2563EB" font-weight="700"><tspan x="904" dy="0">风险漏出 0</tspan></text>
<text x="888" y="1312" font-size="19" fill="#172033" font-weight="700"><tspan x="888" dy="0">证据来源</tspan></text>
<text x="888" y="1340" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">一线反馈项目过多且口径分散</tspan></text>
<text x="888" y="1370" font-size="19" fill="#172033" font-weight="700"><tspan x="888" dy="0">验收方式</tspan></text>
<text x="888" y="1398" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">用统一指标比较专项结果</tspan></text>
<rect x="1568" y="1058" width="740" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="1602" y="1112" font-size="30" fill="#172033" font-weight="700"><tspan x="1602" dy="0">风险与行动</tspan></text>
<text x="1602" y="1150" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="1602" dy="0">风险不进入总览也不能丢，需要在同页后续区域保留。</tspan></text>
<text x="1602" y="1186" font-size="18" fill="#0F766E" font-weight="700"><tspan x="1602" dy="0">风险与待确认</tspan></text>
<rect x="1602" y="1210" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1235" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1618" dy="0">目标过多导致资源稀释</tspan></text>
<rect x="1947" y="1210" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1235" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1963" dy="0">指标口径不一致</tspan></text>
<rect x="1602" y="1258" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1283" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1618" dy="0">模型误判带来业务风险</tspan></text>
<rect x="1947" y="1258" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1283" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1963" dy="0">复盘机制缺失</tspan></text>
<text x="1602" y="1324" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1602" dy="0">下一步行动</tspan></text>
<rect x="1602" y="1348" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1373" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1618" dy="0">确认风险边界</tspan></text>
<rect x="1947" y="1348" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1373" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1963" dy="0">定义异常升级</tspan></text>
<rect x="1602" y="1396" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1421" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1618" dy="0">建立指标字典</tspan></text>
<rect x="1947" y="1396" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1421" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1963" dy="0">两周内完成场景盘点</tspan></text>
<rect x="92" y="1538" width="2216" height="226" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="126" y="1592" font-size="30" fill="#172033" font-weight="700"><tspan x="126" dy="0">问题与背景</tspan></text>
<text x="126" y="1630" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">当前不是缺少项目，而是缺少统一推进框架。</tspan></text>
<line x1="126" y1="1644" x2="126" y2="1714" stroke="#2563EB" stroke-width="6"/>
<text x="148" y="1670" font-size="21" fill="#172033" font-weight="700"><tspan x="148" dy="0">目标口径分散</tspan></text>
<text x="148" y="1702" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="148" dy="0">业务风控经营各看一套指标</tspan><tspan x="148" dy="26">专项结果难以横向比较</tspan></text>
<line x1="880" y1="1644" x2="880" y2="1714" stroke="#2563EB" stroke-width="6"/>
<text x="902" y="1670" font-size="21" fill="#172033" font-weight="700"><tspan x="902" dy="0">系统能力碎片</tspan></text>
<text x="902" y="1702" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="902" dy="0">入口配置评估分散在多处</tspan><tspan x="902" dy="26">试点经验无法稳定复用</tspan></text>
<line x1="1634" y1="1644" x2="1634" y2="1714" stroke="#2563EB" stroke-width="6"/>
<text x="1656" y="1670" font-size="21" fill="#172033" font-weight="700"><tspan x="1656" dy="0">协同成本偏高</tspan></text>
<text x="1656" y="1702" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="1656" dy="0">项目节奏依赖人工协调</tspan><tspan x="1656" dy="26">异常反馈进入闭环较慢</tspan></text>
</svg>
