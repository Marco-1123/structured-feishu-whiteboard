<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1820" viewBox="0 0 2400 1820">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0 0 L10 4 L0 8 z" fill="#2563EB"/>
  </marker>
</defs>
<rect x="0" y="0" width="2400" height="1820" fill="#F7FAFC"/>

<text x="92" y="122" font-size="52" fill="#172033" font-weight="700"><tspan x="92" dy="0">H2智能化经营推进框架</tspan></text>
<text x="92" y="164" font-size="24" fill="#5C6B82" font-weight="400"><tspan x="92" dy="0">以 onepage 大画布保留主线、证据、风险和行动。</tspan></text>
<rect x="92" y="208" width="2216" height="142" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="92" y="208" width="12" height="142" rx="6" fill="#2563EB"/>
<text x="130" y="252" font-size="21" fill="#2563EB" font-weight="700"><tspan x="130" dy="0">核心结论</tspan></text>
<text x="130" y="304" font-size="31" fill="#172033" font-weight="700"><tspan x="130" dy="0">H2 不应堆项目清单，而要用统一目标、专项治理、指标闭环和复用机制形成半年度推进框架。</tspan></text>

<text x="92" y="424" font-size="30" fill="#172033" font-weight="700"><tspan x="92" dy="0">四个核心举措</tspan></text>
<rect x="92" y="470" width="533" height="250" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="120" y="514" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="136" y="539" font-size="18" fill="#2563EB" font-weight="700"><tspan x="136" dy="0">01</tspan></text>
<text x="196" y="541" font-size="27" fill="#172033" font-weight="700"><tspan x="196" dy="0">统一目标</tspan></text>
<line x1="120" y1="582" x2="597" y2="582" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="120" y="628" font-size="20" fill="#5C6B82" font-weight="400"><tspan x="120" dy="0">对齐覆盖降险提效三条主线</tspan><tspan x="120" dy="30">把项目从清单收束为框架</tspan><tspan x="120" dy="30">每个专项只保留一个主目标</tspan></text>
<rect x="653" y="470" width="533" height="250" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="681" y="514" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="697" y="539" font-size="18" fill="#2563EB" font-weight="700"><tspan x="697" dy="0">02</tspan></text>
<text x="757" y="541" font-size="27" fill="#172033" font-weight="700"><tspan x="757" dy="0">专项治理</tspan></text>
<line x1="681" y1="582" x2="1158" y2="582" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="681" y="628" font-size="20" fill="#5C6B82" font-weight="400"><tspan x="681" dy="0">优先处理高频高风险场景</tspan><tspan x="681" dy="30">明确负责人节奏和验收口径</tspan><tspan x="681" dy="30">避免多个团队各自推进</tspan></text>
<rect x="1214" y="470" width="533" height="250" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="1242" y="514" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1258" y="539" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1258" dy="0">03</tspan></text>
<text x="1318" y="541" font-size="27" fill="#172033" font-weight="700"><tspan x="1318" dy="0">数据闭环</tspan></text>
<line x1="1242" y1="582" x2="1719" y2="582" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1242" y="628" font-size="20" fill="#5C6B82" font-weight="400"><tspan x="1242" dy="0">建立统一指标字典和复盘模板</tspan><tspan x="1242" dy="30">上线后持续追踪异常和反馈</tspan><tspan x="1242" dy="30">让结果能横向比较</tspan></text>
<rect x="1775" y="470" width="533" height="250" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="1803" y="514" width="58" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1819" y="539" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1819" dy="0">04</tspan></text>
<text x="1879" y="541" font-size="27" fill="#172033" font-weight="700"><tspan x="1879" dy="0">能力复用</tspan></text>
<line x1="1803" y1="582" x2="2280" y2="582" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1803" y="628" font-size="20" fill="#5C6B82" font-weight="400"><tspan x="1803" dy="0">沉淀入口配置编排和评估能力</tspan><tspan x="1803" dy="30">把单点工具升级为平台能力</tspan><tspan x="1803" dy="30">让下一批专项更快复用</tspan></text>

<rect x="92" y="800" width="725" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="126" y="854" font-size="30" fill="#172033" font-weight="700"><tspan x="126" dy="0">阶段路线</tspan></text>
<text x="126" y="892" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">先对齐，再闭环，最后沉淀为可复用能力。</tspan></text>
<rect x="126" y="926" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="146" y="964" font-size="21" fill="#172033" font-weight="700"><tspan x="146" dy="0">阶段一 对齐</tspan></text>
<text x="146" y="996" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="146" dy="0">两周内完成场景盘点</tspan></text>
<line x1="345" y1="975" x2="367" y2="975" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="366" y="926" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="386" y="964" font-size="21" fill="#172033" font-weight="700"><tspan x="386" dy="0">阶段二 闭环</tspan></text>
<text x="386" y="996" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="386" dy="0">选择 3 个高价值</tspan><tspan x="386" dy="22">专项</tspan></text>
<line x1="585" y1="975" x2="607" y2="975" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="606" y="926" width="209" height="98" rx="10" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="626" y="964" font-size="21" fill="#172033" font-weight="700"><tspan x="626" dy="0">阶段三 复用</tspan></text>
<text x="626" y="996" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="626" dy="0">沉淀配置编排和评估</tspan><tspan x="626" dy="22">能力</tspan></text>
<line x1="126" y1="1078" x2="783" y2="1078" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="126" y="1116" font-size="18" fill="#2563EB" font-weight="700"><tspan x="126" dy="0">近期动作</tspan></text>
<rect x="126" y="1136" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="1161" font-size="17" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">完成场景清单</tspan></text>
<rect x="463" y="1136" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="479" y="1161" font-size="17" fill="#2563EB" font-weight="700"><tspan x="479" dy="0">明确验收口径</tspan></text>
<rect x="126" y="1184" width="319" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="142" y="1209" font-size="17" fill="#2563EB" font-weight="700"><tspan x="142" dy="0">建立复盘节奏</tspan></text>
<rect x="854" y="800" width="676" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="888" y="854" font-size="30" fill="#172033" font-weight="700"><tspan x="888" dy="0">指标与证据</tspan></text>
<text x="888" y="892" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">半成品指标可以保留，但必须服务主线并有业务语义。</tspan></text>
<rect x="888" y="924" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="904" y="953" font-size="19" fill="#2563EB" font-weight="700"><tspan x="904" dy="0">覆盖率目标 xx%</tspan></text>
<rect x="1201" y="924" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1217" y="953" font-size="19" fill="#2563EB" font-weight="700"><tspan x="1217" dy="0">提效目标 xx%</tspan></text>
<rect x="888" y="982" width="295" height="42" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="904" y="1011" font-size="19" fill="#2563EB" font-weight="700"><tspan x="904" dy="0">风险漏出 0</tspan></text>
<text x="888" y="1054" font-size="19" fill="#172033" font-weight="700"><tspan x="888" dy="0">证据来源</tspan></text>
<text x="888" y="1082" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">一线反馈项目过多且口径分散</tspan></text>
<text x="888" y="1112" font-size="19" fill="#172033" font-weight="700"><tspan x="888" dy="0">验收方式</tspan></text>
<text x="888" y="1140" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="888" dy="0">用统一指标比较专项结果</tspan></text>
<rect x="1568" y="800" width="740" height="430" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="1602" y="854" font-size="30" fill="#172033" font-weight="700"><tspan x="1602" dy="0">风险与行动</tspan></text>
<text x="1602" y="892" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="1602" dy="0">风险不进入总览也不能丢，需要在同页后续区域保留。</tspan></text>
<text x="1602" y="928" font-size="18" fill="#0F766E" font-weight="700"><tspan x="1602" dy="0">风险与待确认</tspan></text>
<rect x="1602" y="952" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="977" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1618" dy="0">目标过多导致资源稀释</tspan></text>
<rect x="1947" y="952" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="977" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1963" dy="0">指标口径不一致</tspan></text>
<rect x="1602" y="1000" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1025" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1618" dy="0">模型误判带来业务风险</tspan></text>
<rect x="1947" y="1000" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1025" font-size="17" fill="#0F766E" font-weight="700"><tspan x="1963" dy="0">复盘机制缺失</tspan></text>
<text x="1602" y="1066" font-size="18" fill="#2563EB" font-weight="700"><tspan x="1602" dy="0">下一步行动</tspan></text>
<rect x="1602" y="1090" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1115" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1618" dy="0">确认风险边界</tspan></text>
<rect x="1947" y="1090" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1115" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1963" dy="0">定义异常升级</tspan></text>
<rect x="1602" y="1138" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1618" y="1163" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1618" dy="0">建立指标字典</tspan></text>
<rect x="1947" y="1138" width="327" height="36" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
<text x="1963" y="1163" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1963" dy="0">两周内完成场景盘点</tspan></text>
<rect x="92" y="1280" width="2216" height="226" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="126" y="1334" font-size="30" fill="#172033" font-weight="700"><tspan x="126" dy="0">问题与背景</tspan></text>
<text x="126" y="1372" font-size="19" fill="#5C6B82" font-weight="400"><tspan x="126" dy="0">当前不是缺少项目，而是缺少统一推进框架。</tspan></text>
<line x1="126" y1="1386" x2="126" y2="1456" stroke="#2563EB" stroke-width="6"/>
<text x="148" y="1412" font-size="21" fill="#172033" font-weight="700"><tspan x="148" dy="0">目标口径分散</tspan></text>
<text x="148" y="1444" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="148" dy="0">业务风控经营各看一套指标</tspan><tspan x="148" dy="26">专项结果难以横向比较</tspan></text>
<line x1="880" y1="1386" x2="880" y2="1456" stroke="#2563EB" stroke-width="6"/>
<text x="902" y="1412" font-size="21" fill="#172033" font-weight="700"><tspan x="902" dy="0">系统能力碎片</tspan></text>
<text x="902" y="1444" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="902" dy="0">入口配置评估分散在多处</tspan><tspan x="902" dy="26">试点经验无法稳定复用</tspan></text>
<line x1="1634" y1="1386" x2="1634" y2="1456" stroke="#2563EB" stroke-width="6"/>
<text x="1656" y="1412" font-size="21" fill="#172033" font-weight="700"><tspan x="1656" dy="0">协同成本偏高</tspan></text>
<text x="1656" y="1444" font-size="17" fill="#5C6B82" font-weight="400"><tspan x="1656" dy="0">项目节奏依赖人工协调</tspan><tspan x="1656" dy="26">异常反馈进入闭环较慢</tspan></text>
</svg>
