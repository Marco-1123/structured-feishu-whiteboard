    <path d="M0 0 L10 4 L0 8 z" fill="#2563EB"/>
  </marker>
</defs>
<rect x="0" y="0" width="1600" height="1040" fill="#F7FAFC"/>

<rect x="72" y="60" width="1456" height="150" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<rect x="72" y="60" width="12" height="150" rx="6" fill="#2563EB"/>
<text x="112" y="124" font-size="50" fill="#172033" font-weight="700"><tspan x="112" dy="0">合同审查工具：先从高频低风险场景切入</tspan></text>
<text x="112" y="176" font-size="26" fill="#5C6B82" font-weight="400"><tspan x="112" dy="0">用标准化风险提示降低初次采用门槛，再逐步扩展到团队协作。</tspan></text>

<rect x="72" y="252" width="1456" height="170" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
<text x="112" y="306" font-size="20" fill="#2563EB" font-weight="700"><tspan x="112" dy="0">核心结论</tspan></text>
<text x="112" y="354" font-size="34" fill="#172033" font-weight="700"><tspan x="112" dy="0">第一阶段不做全流程法务系统，而是做“合同上传后 3 分钟内给出风险摘要”的单点产品。</tspan></text>

<rect x="72" y="474" width="456" height="292" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="108" y="542" font-size="28" fill="#172033" font-weight="700"><tspan x="108" dy="0">市场机会</tspan></text>
<text x="108" y="598" font-size="22" fill="#5C6B82" font-weight="400"><tspan x="108" dy="0">中小团队需要更低</tspan><tspan x="108" dy="32">成本的合规工具。</tspan></text>

  <rect x="108" y="700" width="136" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
  <text x="126" y="724" font-size="17" fill="#2563EB" font-weight="700"><tspan x="126" dy="0">需求明确</tspan></text>\n<rect x="572" y="474" width="456" height="292" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="608" y="542" font-size="28" fill="#172033" font-weight="700"><tspan x="608" dy="0">产品切口</tspan></text>
<text x="608" y="598" font-size="22" fill="#5C6B82" font-weight="400"><tspan x="608" dy="0">先做合同审查与</tspan><tspan x="608" dy="32">风险提示两个场景。</tspan></text>

  <rect x="608" y="700" width="136" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
  <text x="626" y="724" font-size="17" fill="#2563EB" font-weight="700"><tspan x="626" dy="0">聚焦高频</tspan></text>\n<rect x="1072" y="474" width="456" height="292" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="1108" y="542" font-size="28" fill="#172033" font-weight="700"><tspan x="1108" dy="0">商业路径</tspan></text>
<text x="1108" y="598" font-size="22" fill="#5C6B82" font-weight="400"><tspan x="1108" dy="0">从免费试用进入</tspan><tspan x="1108" dy="32">团队版订阅。</tspan></text>

  <rect x="1108" y="700" width="136" height="34" rx="8" fill="#EEF4FA" stroke="#D8E2EF" stroke-width="1.5"/>
  <text x="1126" y="724" font-size="17" fill="#2563EB" font-weight="700"><tspan x="1126" dy="0">轻量转化</tspan></text>

<rect x="72" y="824" width="1456" height="130" rx="14" fill="#FFFFFF" stroke="#D8E2EF" stroke-width="2"/>
<text x="112" y="878" font-size="28" fill="#172033" font-weight="700"><tspan x="112" dy="0">下一步：用 20 份真实合同验证风险标签的准确性和用户信任门槛</tspan></text>
<text x="112" y="922" font-size="20" fill="#5C6B82" font-weight="400"><tspan x="112" dy="0">版式：结论先行 ｜ 风格：专业蓝白 ｜ 信息压缩：主结论 + 3 个支撑模块</tspan></text>

</svg>
